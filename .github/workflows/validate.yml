name: validate

on: [push, pull_request]

permissions:
  contents: read

jobs:
  skills:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate skills and generated instructions
        run: bash scripts/validate.sh
