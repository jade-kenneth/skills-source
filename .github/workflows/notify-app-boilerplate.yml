name: notify-app-boilerplate

on:
  push:
    branches: [main]
    paths:
      - conventions/**
      - skills/**
      - scripts/build-agents-md.js
      - scripts/validate-generated-agents.js
      - .github/workflows/notify-app-boilerplate.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.APP_BOILERPLATE_SYNC_TOKEN }}
    steps:
      - name: Dispatch locked skills update
        if: env.GH_TOKEN != ''
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          printf '{"event_type":"skills-source-updated","client_payload":{"sha":"%s"}}' "$SOURCE_SHA" \
            | gh api --method POST repos/jade-kenneth/app-boilerplate/dispatches --input -

      - name: Explain missing token
        if: env.GH_TOKEN == ''
        run: |
          echo "::warning::APP_BOILERPLATE_SYNC_TOKEN is not configured; downstream update was skipped."
